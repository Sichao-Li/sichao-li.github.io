locale                   : "en-AU"
title                    : "Sichao Li"
title_separator          : "-"
name                     : &name "Sichao Li"
description              : &description "Lecturer in Computer Science | Explainable AI, Trustworthy LLMs, and AI for Scientific Discovery"
url                      : "https://sichao-li.github.io"
baseurl                  : ""
repository               : "Sichao-Li/sichao-li.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "master"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : md5
  generatedFields:
    date:
      type               : date
      options:
        format           : "iso8601"
atom_feed:
  hide                   : false
  path                   :
search                   : true
search_full_content      : true
search_provider          : lunr
lunr:
  search_within_pages    : true
google:
  search_engine_id       :
  instant_search         : false
seo:
