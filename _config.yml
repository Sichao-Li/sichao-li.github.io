social:
  type                   : Person
  name                   : &social_name Sichao Li
  links:
    -
analytics:
  provider               : false
author:
  name             : "Sichao Li"
  avatar           : "profile.jpg"
  bio              : "Lecturer in Computer Science at the University of Sydney. Researching Explainable AI, Trustworthy LLMs, AI for Scientific Discovery, and AI in Education."
